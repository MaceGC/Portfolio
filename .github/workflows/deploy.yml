name: Deploy to alwaysdata

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via rsync/SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          REMOTE_HOST: ssh-maceogc.alwaysdata.net
          REMOTE_USER: maceogc
          SOURCE: dist/
          TARGET: /home/maceogc/www/portfolio/
          ARGS: "-rz --delete"
